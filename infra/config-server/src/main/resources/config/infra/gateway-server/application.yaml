server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: main-service-public-categories
          uri: lb://main-service
          predicates:
            - Path=/categories/**
        - id: main-service-public-compilations
          uri: lb://main-service
          predicates:
            - Path=/compilations/**
        - id: main-service-public-events-comments
          uri: lb://main-service
          predicates:
            - Path=/events/*/comments/**
        - id: main-service-public-events
          uri: lb://main-service
          predicates:
            - Path=/events/**
        - id: main-service-private-comments
          uri: lb://main-service
          predicates:
            - Path=/users/*/events/*/comments/**
        - id: main-service-private-events
          uri: lb://main-service
          predicates:
            - Path=/users/*/events/**
        - id: main-service-private-requests
          uri: lb://main-service
          predicates:
            - Path=/users/*/requests/**
        - id: main-service-admin-categories
          uri: lb://main-service
          predicates:
            - Path=/admin/categories/**
        - id: main-service-admin-comments
          uri: lb://main-service
          predicates:
            - Path=/admin/comments/**
        - id: main-service-admin-compilations
          uri: lb://main-service
          predicates:
            - Path=/admin/compilations/**
        - id: main-service-admin-events
          uri: lb://main-service
          predicates:
            - Path=/admin/events/**
        - id: main-service-admin-users
          uri: lb://main-service
          predicates:
            - Path=/admin/users/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.route: DEBUG
    org.springframework.cloud.gateway.handler: DEBUG
    org.springframework.cloud.gateway.filter: DEBUG
    org.springframework.web.reactive: DEBUG

gateway:
  retry:
    enabled: true
    max-attempts: 3
    backoff:
      initial-interval: 100ms
      multiplier: 2
      max-interval: 1000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
      base-path: /actuator
  endpoint:
    health:
      enabled: true
      show-details: always
    gateway:
      enabled: true