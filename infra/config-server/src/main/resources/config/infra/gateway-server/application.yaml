server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: main-service-public-categories
          uri: lb://main-service
          predicates:
            - Path=/categories/**
          order: 1

        - id: main-service-public-compilations
          uri: lb://main-service
          predicates:
            - Path=/compilations/**
          order: 1

        - id: main-service-public-events-comments
          uri: lb://main-service
          predicates:
            - Path=/events/*/comments/**
          order: 1

        - id: main-service-public-events
          uri: lb://main-service
          predicates:
            - Path=/events/**, /event/**
          order: 2

        - id: main-service-private-comments
          uri: lb://main-service
          predicates:
            - Path=/users/*/events/*/comments/**
          order: 1

        - id: main-service-private-events
          uri: lb://main-service
          predicates:
            - Path=/users/*/events/**
          order: 1

        - id: main-service-private-requests
          uri: lb://main-service
          predicates:
            - Path=/users/*/requests/**
          order: 1

        - id: main-service-admin-categories
          uri: lb://main-service
          predicates:
            - Path=/admin/categories/**
          order: 1

        - id: main-service-admin-comments
          uri: lb://main-service
          predicates:
            - Path=/admin/comments/**
          order: 1

        - id: main-service-admin-compilations
          uri: lb://main-service
          predicates:
            - Path=/admin/compilations/**
          order: 1

        - id: main-service-admin-events
          uri: lb://main-service
          predicates:
            - Path=/admin/events/**
          order: 1

        - id: main-service-admin-users
          uri: lb://main-service
          predicates:
            - Path=/admin/users/**
          order: 1

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.route: DEBUG
    org.springframework.cloud.gateway.handler: DEBUG
    org.springframework.cloud.gateway.filter: DEBUG
    org.springframework.web.reactive: DEBUG

gateway:
  retry:
    enabled: true
    max-attempts: 3
    backoff:
      initial-interval: 100ms
      multiplier: 2
      max-interval: 1000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true